name: 每日人形机器人股票日报

# 触发方式
on:
  schedule:
    # 每个交易日(周一~周五)美东时间下午 5 点跑一次
    # = UTC 时间 21:00(美东 EST)/ 22:00(美东 EDT)
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}   # 允许手动一键触发

permissions:
  contents: write   # 允许 Action 把日报提交回仓库

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取数据并生成日报
        run: python tracker.py --no-table

      - name: 提交日报到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "今日无新数据,跳过提交。"
          else
            git commit -m "chore: 自动生成日报 $(date -u +%Y-%m-%d)"
            git push
          fi
